services:
  doc-extraction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-extraction
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
      - path: ./.env.example
        required: false
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "${PORT:-3000}"
      PYTHON_COMMAND: python
      DATA_DIR: /app/data
      MAX_FILES: "${MAX_FILES:-10}"
      MAX_FILE_SIZE_MB: "${MAX_FILE_SIZE_MB:-10}"
      MAX_TOTAL_UPLOAD_MB: "${MAX_TOTAL_UPLOAD_MB:-15}"
    volumes:
      - ./data:/app/data
