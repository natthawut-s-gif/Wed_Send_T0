services:
  doc-extraction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-extraction
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      PYTHON_COMMAND: python
    volumes:
      - ./webhook-settings.json:/app/webhook-settings.json
      - ./upload-history.json:/app/upload-history.json
