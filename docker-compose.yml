services:
  doc-extraction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-extraction
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "${PORT:-3000}"
      PYTHON_COMMAND: python
      DATA_DIR: /app/data
      N8N_WEBHOOK_URL: "${N8N_WEBHOOK_URL:-}"
      EXPORT_DOC_WEBHOOK_URL: "${EXPORT_DOC_WEBHOOK_URL:-}"
      COMMAND_WEBHOOK_URL: "${COMMAND_WEBHOOK_URL:-}"
      LOGIN_WEBHOOK_URL: "${LOGIN_WEBHOOK_URL:-}"
      LOGIN_PASSWORD_SECRET: "${LOGIN_PASSWORD_SECRET:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_AUTHORITY: "${MICROSOFT_AUTHORITY:-https://login.microsoftonline.com/common}"
      MAX_FILES: "${MAX_FILES:-10}"
      MAX_FILE_SIZE_MB: "${MAX_FILE_SIZE_MB:-10}"
      MAX_TOTAL_UPLOAD_MB: "${MAX_TOTAL_UPLOAD_MB:-15}"
    volumes:
      - ./data:/app/data
