<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocExtraction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script
      src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"
      defer
    ></script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="loginGate" class="login-gate">
      <section class="login-card" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <div class="login-head">
          <div class="eyebrow" id="loginEyebrow">Secure Access</div>
          <h2 id="loginTitle">Sign in to continue</h2>
          <p id="loginIntro" class="intro login-intro"></p>
        </div>

        <form id="manualLoginForm" class="modal-form">
          <label class="field">
            <span id="loginEmailLabel">Email</span>
            <input id="loginEmailInput" type="email" autocomplete="username" required />
          </label>

          <label class="field">
            <span id="loginPasswordLabel">Password</span>
            <input
              id="loginPasswordInput"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>

          <button id="manualLoginButton" type="submit" class="secondary-button secondary-button-dark">
            Sign in
          </button>
          <button id="manualRegisterButton" type="button" class="secondary-button">
            Create account
          </button>
        </form>

        <div class="login-divider">
          <span id="loginDividerText">or continue with</span>
        </div>

        <div class="login-provider-grid">
          <div id="googleLoginButtonHost" class="provider-slot"></div>
          <button id="microsoftLoginButton" type="button" class="secondary-button">
            Continue with Microsoft
          </button>
        </div>

        <div id="loginMessage" class="settings-message idle"></div>
      </section>
    </div>

    <main class="page-shell">
      <section class="card">
        <div class="topbar">
          <div id="eyebrowText" class="eyebrow">Public Upload URL</div>
          <div class="topbar-actions">
            <button id="chatButton" type="button" class="icon-button">Chat</button>
            <button id="settingsButton" type="button" class="icon-button">Settings</button>
          </div>
        </div>

        <h1>DocExtraction</h1>
        <div class="app-version-row">
          <span id="versionLabel" class="version-label"></span>
          <strong id="appVersionText" class="version-value">v...</strong>
        </div>
        <p id="introText" class="intro"></p>

        <form id="uploadForm" class="upload-form">
          <label class="field">
            <span id="senderNameLabel"></span>
            <input id="senderNameInput" type="text" name="senderName" />
          </label>

          <label class="field">
            <span id="senderEmailLabel"></span>
            <input id="senderEmail" type="email" name="senderEmail" />
          </label>

          <label class="field">
            <span id="noteLabel"></span>
            <textarea id="noteInput" name="note" rows="4"></textarea>
          </label>

          <label class="dropzone" for="fileInput" id="dropzone">
            <input
              id="fileInput"
              type="file"
              name="files"
              multiple
              accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx,.csv"
            />
            <strong id="dropzoneTitle"></strong>
            <span id="dropzoneHint"></span>
          </label>

          <div id="fileList" class="file-list empty"></div>

          <button id="submitButton" type="submit"></button>
          <div id="uploadProgressCard" class="upload-progress-card idle" aria-live="polite">
            <div class="upload-progress-head">
              <span id="uploadProgressLabel"></span>
              <strong id="uploadProgressPercent">0%</strong>
            </div>
            <div class="upload-progress-bar">
              <span id="uploadProgressFill" style="width: 0%"></span>
            </div>
            <div id="uploadProgressMeta" class="upload-progress-meta"></div>
          </div>
        </form>

        <section class="history-panel">
          <div class="history-panel-head">
            <div>
              <div id="historyKicker" class="status-kicker"></div>
              <h2 id="historyTitle"></h2>
            </div>
            <button id="clearHistoryButton" type="button" class="history-clear-button"></button>
          </div>
          <div id="historyList" class="history-list empty"></div>
        </section>

        <section class="history-panel action-panel">
          <div class="history-panel-head">
            <div>
              <div id="actionPanelKicker" class="status-kicker"></div>
              <h2 id="actionPanelTitle"></h2>
            </div>
          </div>

          <div class="quick-actions">
            <button id="checkButton" type="button" class="secondary-button"></button>
            <button
              id="exportButton"
              type="button"
              class="secondary-button secondary-button-dark"
            ></button>
          </div>

          <section class="action-response-grid single-column">
            <article id="checkResponseCard" class="action-response-card">
              <div class="action-response-head">
                <strong id="checkResponseTitle"></strong>
                <span id="checkResponseBadge" class="mini-badge idle"></span>
              </div>
              <div id="checkResponseBody" class="action-response-body"></div>
            </article>
          </section>
        </section>

        <section id="statusPanel" class="status-panel is-idle">
          <div class="status-panel-head">
            <div>
              <div id="statusKicker" class="status-kicker"></div>
              <h2 id="statusTitle"></h2>
            </div>
            <div id="statusBadge" class="status-badge idle"></div>
          </div>

          <div class="status-summary">
            <div class="summary-card">
              <span id="statusMessageLabel" class="summary-label"></span>
              <strong id="statusMessage"></strong>
            </div>
            <div class="summary-card">
              <span id="statusResultLabel" class="summary-label"></span>
              <strong id="statusNumbers"></strong>
            </div>
          </div>

          <div id="statusMeta" class="status-meta"></div>
          <div id="statusTimeline" class="status-timeline"></div>
        </section>
      </section>
    </main>

    <div id="settingsModal" class="modal-backdrop hidden">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="modal-head">
          <div>
            <div id="settingsKicker" class="status-kicker"></div>
            <h2 id="settingsTitle"></h2>
          </div>
          <button id="closeSettingsButton" type="button" class="close-button"></button>
        </div>

        <form id="settingsForm" class="modal-form">
          <section class="settings-status-grid">
            <article class="settings-status-card">
              <div class="settings-status-head">
                <span id="settingsWebhookStatusLabel"></span>
                <em id="currentWebhookStatus" class="preview-status idle"></em>
              </div>
              <strong id="currentWebhookUrl"></strong>
            </article>

            <article class="settings-status-card">
              <div class="settings-status-head">
                <span id="settingsActionWebhookStatusLabel"></span>
                <em id="currentActionWebhookStatus" class="preview-status idle"></em>
              </div>
              <strong id="currentActionWebhookUrl"></strong>
            </article>

            <article class="settings-status-card">
              <div class="settings-status-head">
                <span id="settingsCommandWebhookStatusLabel"></span>
                <em id="currentCommandWebhookStatus" class="preview-status idle"></em>
              </div>
              <strong id="currentCommandWebhookUrl"></strong>
            </article>

            <article class="settings-status-card">
              <div class="settings-status-head">
                <span id="settingsLoginWebhookStatusLabel"></span>
                <em id="currentLoginWebhookStatus" class="preview-status idle"></em>
              </div>
              <strong id="currentLoginWebhookUrl"></strong>
            </article>

            <article class="settings-status-card">
              <div class="settings-status-head">
                <span id="settingsVersionStatusLabel"></span>
                <em class="preview-status success" id="currentVersionStatus"></em>
              </div>
              <strong id="currentAppVersionValue"></strong>
            </article>
          </section>

          <div class="field">
            <span id="themeSectionLabel"></span>
            <div class="theme-toggle">
              <button
                id="lightThemeButton"
                type="button"
                class="theme-option"
                data-theme-option="light"
                aria-pressed="false"
              ></button>
              <button
                id="darkThemeButton"
                type="button"
                class="theme-option"
                data-theme-option="dark"
                aria-pressed="false"
              ></button>
            </div>
            <div id="themeHelperText" class="theme-helper"></div>
          </div>

          <div class="field">
            <span id="languageSectionLabel"></span>
            <div class="theme-toggle">
              <button
                id="thaiLanguageButton"
                type="button"
                class="theme-option"
                data-language-option="th"
                aria-pressed="false"
              ></button>
              <button
                id="englishLanguageButton"
                type="button"
                class="theme-option"
                data-language-option="en"
                aria-pressed="false"
              ></button>
            </div>
            <div id="languageHelperText" class="theme-helper"></div>
          </div>

          <label class="field">
            <span id="settingsWebhookInputLabel"></span>
            <input id="settingsWebhookUrl" type="url" name="webhookUrl" required />
          </label>

          <label class="field">
            <span id="settingsActionWebhookInputLabel"></span>
            <input id="settingsActionWebhookUrl" type="url" name="actionWebhookUrl" required />
          </label>

          <label class="field">
            <span id="settingsCommandWebhookInputLabel"></span>
            <input id="settingsCommandWebhookUrl" type="url" name="commandWebhookUrl" required />
          </label>

          <label class="field">
            <span id="settingsLoginWebhookInputLabel"></span>
            <input id="settingsLoginWebhookUrl" type="url" name="loginWebhookUrl" />
          </label>

          <label class="field">
            <span id="settingsGoogleClientIdInputLabel"></span>
            <input id="settingsGoogleClientId" type="text" name="googleClientId" />
          </label>

          <label class="field">
            <span id="settingsMicrosoftClientIdInputLabel"></span>
            <input id="settingsMicrosoftClientId" type="text" name="microsoftClientId" />
          </label>

          <label class="field">
            <span id="settingsMicrosoftAuthorityInputLabel"></span>
            <input id="settingsMicrosoftAuthority" type="url" name="microsoftAuthority" />
          </label>

          <div id="settingsMessage" class="settings-message idle"></div>

          <div class="modal-actions">
            <button id="saveSettingsButton" type="submit"></button>
          </div>
        </form>
      </section>
    </div>

    <div id="chatModal" class="modal-backdrop hidden">
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="chatTitle">
        <div class="modal-head">
          <div>
            <div id="chatKicker" class="status-kicker"></div>
            <h2 id="chatTitle"></h2>
          </div>
          <button id="closeChatButton" type="button" class="close-button"></button>
        </div>

        <form id="chatForm" class="modal-form">
          <label class="field">
            <span id="chatNodeLabel"></span>
            <select id="chatNodeSelect" name="node" required></select>
          </label>

          <label class="field">
            <span id="chatInputLabel"></span>
            <textarea
              id="chatInput"
              name="message"
              rows="6"
              class="chat-textarea"
              placeholder="Type a command or message"
              required
            ></textarea>
          </label>

          <div id="chatMessage" class="settings-message idle"></div>

          <article id="chatResponseCard" class="action-response-card">
            <div class="action-response-head">
              <strong id="chatResponseTitle"></strong>
              <span id="chatResponseBadge" class="mini-badge idle"></span>
            </div>
            <div id="chatResponseBody" class="action-response-body"></div>
          </article>

          <div class="modal-actions">
            <button id="runChatCommandButton" type="submit"></button>
          </div>
        </form>
      </section>
    </div>

    <div id="exportPreviewModal" class="modal-backdrop hidden">
      <section class="modal-card export-modal-card" role="dialog" aria-modal="true" aria-labelledby="exportModalTitle">
        <div class="modal-head">
          <div>
            <div id="exportModalKicker" class="status-kicker"></div>
            <h2 id="exportModalTitle"></h2>
          </div>
          <button id="closeExportModalButton" type="button" class="close-button"></button>
        </div>

        <div class="modal-form">
          <div id="exportModalMessage" class="settings-message idle"></div>

          <article id="exportModalResponseCard" class="action-response-card">
            <div class="action-response-head">
              <strong id="exportModalResponseTitle"></strong>
              <span id="exportModalResponseBadge" class="mini-badge idle"></span>
            </div>
            <div id="exportModalResponseBody" class="action-response-body"></div>
          </article>

          <div class="modal-actions">
            <button id="cancelEditExportButton" type="button" class="secondary-button"></button>
            <button id="editExportButton" type="button" class="secondary-button"></button>
            <button id="exportAndClearConfirmButton" type="button" class="secondary-button secondary-button-dark"></button>
          </div>
        </div>
      </section>
    </div>

      function t(key, vars = {}) {
        const dictionary = TRANSLATIONS[currentLanguage] || TRANSLATIONS.th;
        const fallback = TRANSLATIONS.en[key] || key;
        const template = dictionary[key] || fallback;
        return template.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? ""));
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          };
          return map[char];
        });
      }

      function normalizeHistoryEmail(value) {
        return String(value || "").trim().toLowerCase();
      }

      function formatTimestamp() {
        const locale = currentLanguage === "th" ? "th-TH" : "en-US";
        return new Date().toLocaleString(locale, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      function shortenUrl(value) {
        if (!value) {
          return t("notConfigured");
        }
        return value.length > 64 ? `${value.slice(0, 61)}...` : value;
      }

      function setText(id, value) {
        const element = document.getElementById(id);
        if (element) {
          element.textContent = value;
        }

      function applyTheme(theme) {
        currentTheme = theme === "dark" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", currentTheme);
        localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
        lightThemeButton.classList.toggle("active", currentTheme === "light");
        darkThemeButton.classList.toggle("active", currentTheme === "dark");
        lightThemeButton.setAttribute("aria-pressed", String(currentTheme === "light"));
        darkThemeButton.setAttribute("aria-pressed", String(currentTheme === "dark"));
        if (currentSettingsPayload) {
          renderGoogleLoginButton();

        currentLanguage = language === "en" ? "en" : "th";

      function persistLoginSession(session) {
        loginState = {
          isAuthenticated: true,
          provider: session.provider || "",
          email: session.email || ""
        };
        sessionStorage.setItem(LOGIN_SESSION_STORAGE_KEY, JSON.stringify(loginState));
        loginGate.classList.add("hidden");
        senderEmail.value = session.email || senderEmail.value;
        persistSenderFields();
        renderUploadHistory();
      }

      function loadLoginSession() {
        try {
          const raw = sessionStorage.getItem(LOGIN_SESSION_STORAGE_KEY);
          if (!raw) {
            return;
          }

          const session = JSON.parse(raw);
          if (!session || !session.email) {
            return;
          }

          persistLoginSession(session);
        } catch (error) {
          sessionStorage.removeItem(LOGIN_SESSION_STORAGE_KEY);
        }
      }

      function decodeJwtPayload(token) {
        if (!token || typeof token !== "string" || !token.includes(".")) {
          return null;
        }

        try {
          const payload = token.split(".")[1];
          const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
          const decoded = atob(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "="));
          return JSON.parse(decoded);
        } catch (error) {
          return null;
        }
      }

      async function submitLogin(provider, payload) {
        if (!currentSettingsPayload?.loginWebhookConfigured) {
          throw new Error(t("loginWebhookMissing"));
        }

        setLoginMessageState({ state: "loading", raw: t("loginSending") });
        manualLoginButton.disabled = true;
        manualRegisterButton.disabled = true;
        microsoftLoginButton.disabled = true;

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              provider,
              ...payload
            })
          });
          const result = await response.json();

          if (!response.ok || !result.ok) {
            throw new Error(result.message || t("loginFailed"));
          }

          persistLoginSession({
            provider,
            email: payload.email || ""
          });
          setLoginMessageState({ state: "success", raw: t("loginSuccess") });
          return result;
        } finally {
          manualLoginButton.disabled = false;
          manualRegisterButton.disabled = false;
          microsoftLoginButton.disabled = false;
        }
      }

      async function submitRegister(payload) {
        if (!currentSettingsPayload?.loginWebhookConfigured) {

        manualLoginButton.disabled = true;

      async function runGoogleLogin(response) {
        try {
          const payload = decodeJwtPayload(response?.credential || "");
          const email = payload?.email || "";

          if (!email) {
            throw new Error(t("loginFailed"));
          }

          await submitLogin("google", {
            email,
            idToken: response.credential || ""
          });
        } catch (error) {
          setLoginMessageState({ state: "error", raw: error.message });
        }
      }

      async function runMicrosoftLogin() {
        if (!currentSettingsPayload?.microsoftLoginConfigured) {
          setLoginMessageState({ state: "error", raw: t("loginMicrosoftMissing") });
          return;
        }

        if (!window.msal?.PublicClientApplication) {
          setLoginMessageState({ state: "error", raw: "Microsoft login library is unavailable." });
          return;
        }

        try {
          if (!currentMsalApp) {
            currentMsalApp = new window.msal.PublicClientApplication({
              auth: {
                clientId: currentSettingsPayload.microsoftClientId,
                authority:
                  currentSettingsPayload.microsoftAuthority ||
                  "https://login.microsoftonline.com/common",
                redirectUri: window.location.origin
              }
            });
            await currentMsalApp.initialize();
          }

          const result = await currentMsalApp.loginPopup({
            scopes: ["openid", "profile", "email"]
          });
          const email = result?.account?.username || "";

          if (!email) {
            throw new Error(t("loginFailed"));
          }

          await submitLogin("microsoft", {
            email,
            idToken: result.idToken || "",
            accessToken: result.accessToken || ""
          });
        } catch (error) {
          setLoginMessageState({ state: "error", raw: error.message || t("loginFailed") });
        }
      }

      function renderChatResponse() {
        if (!chatResponseState || chatResponseState.type === "idle") {
          chatResponseCard.className = "action-response-card";
          chatResponseBadge.className = "mini-badge idle";
          chatResponseBadge.textContent = t("notUsedYet");
          chatResponseBody.innerHTML = escapeHtml(t("chatResponseIdle"));
          return;

        if (chatResponseState.type === "loading") {
          chatResponseCard.className = "action-response-card loading";
          chatResponseBadge.className = "mini-badge loading";
          chatResponseBadge.textContent = t("sendingCommand");
          chatResponseBody.innerHTML = `
            <div class="response-meta">
              <span>${escapeHtml(t("chatNodeMetaLabel"))}: ${escapeHtml(
                chatResponseState.node || "-"
              )}</span>
              <span>${escapeHtml(t("chatCommandLabel"))}: ${escapeHtml(
                chatResponseState.command || "-"
              )}</span>
            </div>
            <div class="response-empty">${escapeHtml(t("chatResponseSending"))}</div>
          `;
          return;
        }

        if (chatResponseState.type === "error") {
          chatResponseCard.className = "action-response-card error";
          chatResponseBadge.className = "mini-badge error";
          chatResponseBadge.textContent = t("failedShort");
          chatResponseBody.innerHTML = `
            <div class="response-meta">
              <span>${escapeHtml(t("chatNodeMetaLabel"))}: ${escapeHtml(
                chatResponseState.node || "-"
              )}</span>
              <span>${escapeHtml(t("chatCommandLabel"))}: ${escapeHtml(
                chatResponseState.command || "-"
              )}</span>
            </div>
            <div class="response-plain">${escapeHtml(chatResponseState.message || t("chatFailed"))}</div>
          `;
          return;
        }

        const result = chatResponseState.result || {};
        const isSuccess = Boolean(chatResponseState.ok);
        chatResponseCard.className = `action-response-card ${isSuccess ? "success" : "error"}`;
        chatResponseBadge.className = `mini-badge ${isSuccess ? "success" : "error"}`;
        chatResponseBadge.textContent = isSuccess ? t("successShort") : t("failedShort");
        chatResponseBody.innerHTML = `
          <div class="response-meta">
            <span>${escapeHtml(t("chatNodeMetaLabel"))}: ${escapeHtml(result.node || "-")}</span>
            <span>${escapeHtml(t("chatCommandLabel"))}: ${escapeHtml(result.command || "-")}</span>

              String(result.webhookStatus || "-")
            )}</span>

      async function loadChatNodeOptions() {
        chatNodesLoading = true;
        renderChatNodeOptions();

        try {
          const response = await fetch("/web-command/options");
          const result = await response.json();

          if (!response.ok || !result.ok) {
            throw new Error(result.message || t("chatNodeLoadFailed"));
          }

          chatNodeItems = Array.isArray(result.items) ? result.items : [];
          chatNodeOptions = Array.isArray(result.nodes) ? result.nodes.filter(Boolean) : [];
          renderChatNodeOptions();

          if (!chatNodeOptions.length) {
            setChatMessageState({ state: "error", key: "chatNodeLoadFailed" });
            return;
          }

          setChatMessageState({ state: "idle", key: "chatMessageIdle" });
        } catch (error) {
          chatNodeOptions = [];
          chatNodeItems = [];
          setChatMessageState({ state: "error", raw: error.message || t("chatNodeLoadFailed") });
          renderChatNodeOptions();
        } finally {
          chatNodesLoading = false;
          renderChatNodeOptions();
        }
      }

      function getSelectedFileKey(file) {
        return [file?.name || "", file?.size || 0, file?.lastModified || 0, file?.type || ""].join("::");
      }

      function mergeSelectedFiles(nextFiles) {
        const merged = [...selectedFiles];
        const seen = new Set(merged.map(getSelectedFileKey));

        nextFiles.forEach((file) => {
          const key = getSelectedFileKey(file);
          if (!seen.has(key)) {
            seen.add(key);
            merged.push(file);
          }
        });

        selectedFiles = merged;
        syncFileInput();
        renderFiles(selectedFiles);
      }

      function formatWebhookValue(value) {
        if (value === null || value === undefined || value === "") {
          return '<span class="response-empty-inline">-</span>';
        }

        if (typeof value === "object") {
          return `<pre class="response-json">${escapeHtml(
            JSON.stringify(value, null, 2)
          )}</pre>`;
        }

        return `<span>${escapeHtml(String(value))}</span>`;
      }

      function deepCloneValue(value) {
        if (value === null || value === undefined) {
          return value;
        }

        if (typeof structuredClone === "function") {
          return structuredClone(value);
        }

        return JSON.parse(JSON.stringify(value));
      }

      function canEditWebhookBody(body) {
        if (Array.isArray(body)) {
          return body.every((item) => item && typeof item === "object" && !Array.isArray(item));
        }

        return Boolean(body && typeof body === "object");
      }

      function coerceEditedValue(rawValue, originalValue) {
        const value = String(rawValue ?? "");

        if (typeof originalValue === "number") {
          const numericValue = Number(value);
          return Number.isFinite(numericValue) ? numericValue : originalValue;
        }

        if (typeof originalValue === "boolean") {
          return value.trim().toLowerCase() === "true";
        }

        if (originalValue === null) {
          return value === "" ? null : value;
        }

        return value;
      }

      function updateEditableExportValue(rowIndex, field, rawValue) {
        if (!exportPreviewState || !exportPreviewState.editedBody) {
          return;
        }

        if (Array.isArray(exportPreviewState.editedBody)) {
          const targetRow = exportPreviewState.editedBody[rowIndex];
          const originalRow =
            Array.isArray(exportPreviewState.originalBody) ? exportPreviewState.originalBody[rowIndex] : null;
          if (!targetRow || typeof targetRow !== "object") {
            return;
          }

          const originalValue = originalRow && typeof originalRow === "object" ? originalRow[field] : "";
          targetRow[field] = coerceEditedValue(rawValue, originalValue);
          return;
        }

        if (exportPreviewState.editedBody && typeof exportPreviewState.editedBody === "object") {
          const originalValue =
            exportPreviewState.originalBody && typeof exportPreviewState.originalBody === "object"
              ? exportPreviewState.originalBody[field]
              : "";
          exportPreviewState.editedBody[field] = coerceEditedValue(rawValue, originalValue);
        }
      }

      function removeEditableExportRow(rowIndex) {
        if (!exportPreviewState || !Array.isArray(exportPreviewState.editedBody)) {
          return null;
        }

        const safeIndex = Number(rowIndex);
        if (Number.isNaN(safeIndex) || safeIndex < 0 || safeIndex >= exportPreviewState.editedBody.length) {
          return null;
        }

        return exportPreviewState.editedBody.splice(safeIndex, 1)[0] || null;
      }

      function renderWebhookBody(body) {
        if (body === null || body === undefined || body === "") {
          return `<div class="response-empty">${escapeHtml(t("noResponseBody"))}</div>`;
        }

        if (Array.isArray(body)) {
          if (!body.length) {
            return `<div class="response-empty">${escapeHtml(t("responseEmptyArray"))}</div>`;
          }

          return `
            <div class="response-list">
              ${body
                .map(
                  (item, index) => `
                    <div class="response-row">
                      <strong>${escapeHtml(t("responseItemLabel", { index: index + 1 }))}</strong>
                      ${formatWebhookValue(item)}
                    </div>
                  `
                )
                .join("")}
            </div>
          `;
        }

        if (typeof body === "object") {
          const entries = Object.entries(body);

          if (!entries.length) {
            return `<div class="response-empty">${escapeHtml(t("responseEmptyObject"))}</div>`;
          }

          return `
            <div class="response-list">
              ${entries
                .map(
                  ([key, value]) => `
                    <div class="response-row">
                      <strong>${escapeHtml(key)}</strong>
                      ${formatWebhookValue(value)}
                    </div>
                  `
                )
                .join("")}
            </div>
          `;
        }

        return `<div class="response-plain">${escapeHtml(String(body))}</div>`;
      }

      function isReadOnlyExportField(field) {
        return ["id", "createdAt", "updatedAt"].includes(String(field || "").trim());
      }

      function getExportTableColumnClass(field) {
        const normalized = String(field || "").trim().toLowerCase();
        if (normalized === "id") {
          return "col-id";
        }
        if (normalized === "description") {
          return "col-description";
        }
        if (normalized === "company") {
          return "col-company";
        }
        if (normalized === "invoice_no") {
          return "col-invoice";
        }
        if (normalized === "document_type") {
          return "col-document-type";
        }
        if (normalized === "email") {
          return "col-email";
        }
        if (normalized === "qty" || normalized === "price") {
          return "col-number";
        }
        if (["id", "createdat", "updatedat"].includes(normalized)) {
          return "col-meta";
        }
        return "col-default";
      }

      function orderExportColumns(columns) {
        const list = Array.isArray(columns) ? [...columns] : [];
        const idIndex = list.findIndex((column) => String(column || "").trim().toLowerCase() === "id");
        if (idIndex > 0) {
          const [idColumn] = list.splice(idIndex, 1);
          list.unshift(idColumn);
        }
        return list;
      }

      function compareExportIdValues(left, right, direction = "asc") {
        const normalize = (value) => {
          if (value === null || value === undefined || value === "") {
            return null;
          }
          const numeric = Number(value);
          if (Number.isFinite(numeric)) {
            return { kind: "number", value: numeric };
          }
          return { kind: "string", value: String(value).toLowerCase() };
        };

        const leftValue = normalize(left);
        const rightValue = normalize(right);
        const multiplier = direction === "desc" ? -1 : 1;

        if (!leftValue && !rightValue) {
          return 0;
        }
        if (!leftValue) {
          return 1;
        }
        if (!rightValue) {
          return -1;
        }
        if (leftValue.kind === "number" && rightValue.kind === "number") {
          return (leftValue.value - rightValue.value) * multiplier;
        }
        return leftValue.value.localeCompare(rightValue.value, undefined, { numeric: true }) * multiplier;
      }

      function sortExportPreviewRowsInState(direction = "asc") {
        if (!exportPreviewState || exportPreviewState.type !== "result") {
          return;
        }

        const sortRows = (rows) => {
          if (!Array.isArray(rows) || !rows.every((item) => item && typeof item === "object" && !Array.isArray(item))) {
            return rows;
          }
          return [...rows].sort((left, right) => compareExportIdValues(left?.id, right?.id, direction));
        };

        const nextWebhookBody = sortRows(exportPreviewState.result?.webhookBody);
        const nextOriginalBody = sortRows(exportPreviewState.originalBody);
        const nextEditedBody = sortRows(exportPreviewState.editedBody);

        exportPreviewState = {
          ...exportPreviewState,
          sortDirection: direction,
          originalBody: nextOriginalBody,
          editedBody: nextEditedBody,
          result: {
            ...exportPreviewState.result,
            webhookBody: nextWebhookBody
          }
        };
      }

      function renderWebhookTable(body, options = {}) {
        const { editable = false } = options;
        if (body === null || body === undefined || body === "") {
          return `<div class="response-empty">${escapeHtml(t("exportModalTableEmpty"))}</div>`;
        }

        if (Array.isArray(body)) {
          if (!body.length) {
            return `<div class="response-empty">${escapeHtml(t("exportModalTableEmpty"))}</div>`;
          }

          const allObjects = body.every((item) => item && typeof item === "object" && !Array.isArray(item));
          if (allObjects) {
            const columns = orderExportColumns([...new Set(body.flatMap((item) => Object.keys(item)))]);
            return `
              <div class="response-table-wrap response-table-wrap-export">
                <table class="response-table response-table-export">

                    <tr>${columns
                      .map((column) =>
                        String(column || "").trim().toLowerCase() === "id"
                          ? `<th class="${getExportTableColumnClass(column)}"><button type="button" class="table-sort-button" data-sort-field="id">${escapeHtml(
                              column
                            )} ${exportPreviewState?.sortDirection === "desc" ? "↓" : "↑"}</button></th>`
                          : `<th class="${getExportTableColumnClass(column)}">${escapeHtml(column)}</th>`
                      )
                      .join("")}</tr>
                  </thead>
                  <tbody>
                    ${body
                      .map(
                        (item, rowIndex) => `
                          <tr>
                            ${columns
                              .map((column) => {
                                if (!editable) {
                                  return `<td class="${getExportTableColumnClass(column)}">${formatWebhookValue(item[column])}</td>`;
                                }

                                return `<td class="${getExportTableColumnClass(column)}">
                                  <textarea
                                    class="table-edit-input"
                                    data-row-index="${rowIndex}"
                                    data-field="${escapeHtml(column)}"
                                  >${escapeHtml(String(item[column] ?? ""))}</textarea>

                              })
                              .join("")}
                          </tr>
                        `
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            `;
          }

          return `
            <div class="response-table-wrap">
              <table class="response-table">
                <thead>
                  <tr>
                    <th>${escapeHtml(t("responseItemLabel", { index: "#" }))}</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody>
                  ${body
                    .map(
                      (item, index) => `
                        <tr>
                          <td>${escapeHtml(String(index + 1))}</td>
                          <td>${formatWebhookValue(item)}</td>
                        </tr>
                      `
                    )
                    .join("")}

        if (typeof body === "object") {
          const entries = Object.entries(body);
          if (!entries.length) {

          }

          return `
            <div class="response-table-wrap">
              <table class="response-table">
                <thead>
                  <tr>
                    <th>Field</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody>
                  ${entries
                    .map(
                      ([key, value]) => `
                        <tr>

                          }</td>
                        </tr>
                      `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          `;
        }

        return `
          <div class="response-table-wrap">
            <table class="response-table">
              <thead>
                <tr>
                  <th>Value</th>
                </tr>
              </thead>
              <tbody>

      function renderEditableWebhookEditor(body) {
        if (body === null || body === undefined || body === "") {

        function renderEditableField(field, value, rowIndex) {

        if (typeof body === "object") {
          return `

              <div class="edit-field-list">
                ${Object.entries(body).map(([field, value]) => renderEditableField(field, value)).join("")}

        return `

      function renderActionCard(action) {
        if (action !== "check") {
          return;

        const card = checkResponseCard;
        const badge = checkResponseBadge;
        const body = checkResponseBody;
        const state = actionCardStates[action];

        if (!state || state.type === "idle") {
          card.className = "action-response-card";
          badge.className = "mini-badge idle";
          badge.textContent = t("notUsedYet");
          body.innerHTML = escapeHtml(t("actionCardIdleBody"));
          return;
        }

        if (state.type === "loading") {
          card.className = "action-response-card loading";
          badge.className = "mini-badge loading";
          badge.textContent = t("sendingCommand");
          body.innerHTML = `
            <div class="response-meta">
              <span>${escapeHtml(t("actionLabel"))}: ${escapeHtml(state.action)}</span>
              <span>${escapeHtml(t("emailMetaLabel"))}: ${escapeHtml(state.email || "-")}</span>
            </div>
            <div class="response-empty">${escapeHtml(t("waitingRespondToWebhook"))}</div>
          `;
          return;
        }

        if (state.type === "error") {
          card.className = "action-response-card error";
          badge.className = "mini-badge error";
          badge.textContent = t("connectionFailed");
          body.innerHTML = `
            <div class="response-meta">
              <span>${escapeHtml(t("actionLabel"))}: ${escapeHtml(state.action)}</span>
              <span>${escapeHtml(t("emailMetaLabel"))}: ${escapeHtml(state.email || "-")}</span>
            </div>
            <div class="response-plain">${escapeHtml(state.message)}</div>

        card.className = `action-response-card ${isSuccess ? "success" : "error"}`;

        badge.textContent = isSuccess ? t("successShort") : t("failedShort");
        body.innerHTML = `
          <div class="response-meta">
            <span>${escapeHtml(t("actionLabel"))}: ${escapeHtml(state.result.action || action)}</span>
            <span>${escapeHtml(t("emailMetaLabel"))}: ${escapeHtml(state.result.email || state.email || "-")}</span>
            <span>${escapeHtml(t("webhookMetaLabel"))}: ${escapeHtml(String(state.result.webhookStatus || "-"))}</span>

          exportModalResponseBody.innerHTML = `

          editExportButton.textContent =

        if (state.type === "error") {
          exportModalMessage.className = "settings-message error";

          exportModalResponseCard.className = "action-response-card error";
          exportModalResponseBadge.className = "mini-badge error";
          exportModalResponseBadge.textContent = t("failedShort");
          exportModalResponseBody.innerHTML = `<div class="response-plain">${escapeHtml(state.message || t("serverConnectionFailed"))}</div>`;
          editExportButton.textContent = t("exportModalEditButton");

        const isSuccess = Boolean(state.ok);
        const editing = Boolean(state.isEditing);
        exportModalMessage.className = `settings-message ${editing ? "loading" : isSuccess ? "success" : "error"}`;
        exportModalMessage.textContent = state.messageOverride
          ? state.messageOverride
          : editing
            ? t("exportModalEditing")
            : state.action === "edit" && isSuccess
              ? t("exportModalEditSuccess")
              : state.action === "delete" && isSuccess
                ? t("exportModalDeleteSuccess")
                : resolveMessage(state.result || {}, "uploadSuccessDefault", "uploadErrorDefault");
        exportModalResponseCard.className = `action-response-card ${isSuccess ? "success" : "error"}`;
        exportModalResponseBadge.className = `mini-badge ${isSuccess ? "success" : "error"}`;
        exportModalResponseBadge.textContent = isSuccess ? t("successShort") : t("failedShort");
        exportModalResponseBody.innerHTML = `
          <div class="response-meta">

            <span>${escapeHtml(t("emailMetaLabel"))}: ${escapeHtml(state.result.email || state.email || "-")}</span>
            <span>${escapeHtml(t("webhookMetaLabel"))}: ${escapeHtml(String(state.result.webhookStatus || "-"))}</span>

        editExportButton.textContent = editing ? t("exportModalSaveEditButton") : t("exportModalEditButton");
        editExportButton.disabled = !canEditWebhookBody(state.result.webhookBody);

      function resolveMessage(result, successKey, errorKey) {
        if (result.messageKey) {
          return t(result.messageKey, result.messageVars || {});
        }
        if (result.message) {
          return result.message;
        }
        return result.ok === false ? t(errorKey) : t(successKey);
      }

      function createSequentialUploadItems(files) {
        return files.map((file, index) => ({
          fileIndex: index + 1,
          originalName: file.name,
          ok: null,
          state: "queued",
          uploadPercent: 0,
          progress: null,
          detail: t("sequentialQueuedDetail", {
            name: file.name
          }),
          successCount: 0,
          failureCount: 0,
          outboundFileCount: 0
        }));
      }

      const OCR_STAGE_SEQUENCE = [
        "rendering_pdf",
        "preprocessing_image",
        "normalizing_size",
        "cropping_document",
        "deskewing_document",
        "detecting_document_profile",
        "cleanup_document",
        "grayscale_document",
        "visual_cleanup",
        "denoise_document",
        "enhance_document",
        "scoring_ocr_candidates"
      ];

      const OCR_CANDIDATE_SEQUENCE = [
        "clean",
        "otsu_threshold",
        "adaptive_threshold",
        "dark_text",
        "digit_focus"
      ];

      const PROGRESS_SEGMENTS = {
        upload: { start: 0, end: 18 },
        queue: { start: 18, end: 24 },
        preprocess: { start: 24, end: 78 },
        forward: { start: 78, end: 99 }
      };

      function clampProgressValue(value, min = 0, max = 100) {
        return Math.max(min, Math.min(max, value));
      }

      function interpolateProgressSegment(segment, ratio) {
        const safeRatio = clampProgressValue(Number(ratio) || 0, 0, 1);
        return Math.round(
          segment.start + ((segment.end - segment.start) * safeRatio)
        );
      }

      function getOcrStageWeight(phase) {
        return phase === "scoring_ocr_candidates" ? OCR_CANDIDATE_SEQUENCE.length : 1;
      }

      function getOcrRenderUnits(progress, pageCount, currentPage) {
        let completedUnits = 0;

        for (const phase of OCR_STAGE_SEQUENCE) {
          if (phase === progress.phase) {
            if (phase === "scoring_ocr_candidates") {
              const candidate = String(progress.candidate || "");
              const candidateIndex = OCR_CANDIDATE_SEQUENCE.indexOf(candidate);
              completedUnits += Math.max(0, candidateIndex) + 1;
            } else {
              completedUnits += 1;
            }
            break;
          }

          completedUnits += getOcrStageWeight(phase);
        }

        const unitsPerPage = OCR_STAGE_SEQUENCE.reduce(
          (sum, phase) => sum + getOcrStageWeight(phase),
          0
        );

        return {
          completedUnits: Math.max(0, ((currentPage - 1) * unitsPerPage) + completedUnits),
          totalUnits: Math.max(1, pageCount * unitsPerPage)
        };
      }

      function getItemProgressSnapshot(item) {
        const progress = item?.progress;
        const uploadPercent = Number(item?.uploadPercent);

        if (
          item?.state === "uploading" &&
          Number.isFinite(uploadPercent)
        ) {
          return {
            percent: interpolateProgressSegment(
              PROGRESS_SEGMENTS.upload,
              uploadPercent / 100
            ),
            metaText: `${clampProgressValue(Math.round(uploadPercent))}% uploaded`
          };
        }

        if (!progress || typeof progress !== "object") {
          return item?.state === "success"
            ? {
                percent: 100,
                metaText: "Completed"
              }
            : null;
        }

        const pageCount = Math.max(
          1,
          Number(progress.pageCount || progress.preparedPages || progress.outboundFileCount || 1)
        );
        const currentPage = Math.max(
          1,
          Number(progress.currentPageNumber || progress.preparedPages || progress.sentPages || 1)
        );
        const sentPages = Math.max(0, Number(progress.sentPages || 0));

        let percent = 0;
        let metaText = "";

        if (progress.phase === "queued") {
          percent = PROGRESS_SEGMENTS.queue.start;
          metaText = "Queued";
        } else if (progress.phase === "preparing" || progress.phase === "processing") {
          percent = PROGRESS_SEGMENTS.queue.end;
          metaText = "Preparing";
        } else if (progress.phase === "forwarding_original") {
          const current = Math.max(0, Math.min(pageCount, sentPages));
          percent = interpolateProgressSegment(
            PROGRESS_SEGMENTS.forward,
            current / pageCount
          );
          metaText = `${current}/${pageCount} file`;
        } else if (progress.phase === "completed" || progress.phase === "completed_with_errors") {
          const completed = Math.max(sentPages, pageCount);
          percent = 100;
          metaText = `${Math.min(completed, pageCount)}/${pageCount} done`;
        } else if (progress.phase === "forwarding_image_ocr") {
          const total = Math.max(1, pageCount);
          const current = Math.max(0, Math.min(total, sentPages));
          percent = interpolateProgressSegment(
            PROGRESS_SEGMENTS.forward,
            current / total
          );
          metaText = `${current}/${total} image`;
        } else if (progress.phase === "forwarding_pdf_pages") {
          const total = Math.max(1, pageCount);
          const current = Math.max(0, Math.min(total, sentPages));
          percent = interpolateProgressSegment(
            PROGRESS_SEGMENTS.forward,
            current / total
          );
          metaText = `${current}/${total} pages`;
        } else if (OCR_STAGE_SEQUENCE.includes(progress.phase)) {
          const renderUnits = getOcrRenderUnits(progress, pageCount, currentPage);
          const current = Math.max(
            0,
            Math.min(renderUnits.totalUnits, renderUnits.completedUnits)
          );
          const total = Math.max(1, renderUnits.totalUnits);
          percent = interpolateProgressSegment(
            PROGRESS_SEGMENTS.preprocess,
            current / total
          );
          metaText = `${current}/${total} steps`;
        } else if (progress.phase === "failed") {
          if (sentPages > 0 && pageCount > 0) {
            percent = interpolateProgressSegment(
              PROGRESS_SEGMENTS.forward,
              sentPages / pageCount
            );
            metaText = `${Math.min(sentPages, pageCount)}/${pageCount} pages`;
          } else if (currentPage > 0 && pageCount > 0) {
            const renderUnits = getOcrRenderUnits(
              {
                ...progress,
                phase: OCR_STAGE_SEQUENCE.includes(progress.lastKnownPhase)
                  ? progress.lastKnownPhase
                  : "preprocessing_image"
              },
              pageCount,
              currentPage
            );
            percent = interpolateProgressSegment(
              PROGRESS_SEGMENTS.preprocess,
              renderUnits.completedUnits / Math.max(1, renderUnits.totalUnits)
            );
            metaText = `${Math.min(currentPage, pageCount)}/${pageCount} pages`;
          } else {
            percent = PROGRESS_SEGMENTS.queue.end;
            metaText = "Stopped";
          }
        } else {
          return null;
        }

        return {
          percent: clampProgressValue(percent, 4, 100),
          metaText
        };
      }

      function renderUploadTimelineItems(items) {
        return items.map((item) => {
          const timelineState =
            item.state === "success"
              ? "success"
              : item.state === "error"
                ? "error"
                : item.state === "uploading" || item.state === "processing"
                  ? "loading"
                  : "neutral";
          const progress = getItemProgressSnapshot(item);
          const progressMarkup = progress
            ? `
                <div class="timeline-progress">
                  <div class="timeline-progress-bar">
                    <span style="width: ${progress.percent}%"></span>
                  </div>
                  <div class="timeline-progress-meta">${escapeHtml(progress.metaText || `${progress.percent}%`)}</div>
                </div>
              `
            : "";

          return `
            <article class="timeline-item ${timelineState}">
              <div class="timeline-dot"></div>

                <strong>${escapeHtml(t("fileLabel", { index: item.fileIndex }))}</strong>
                <span>${escapeHtml(item.originalName || t("unnamedFile"))}</span>
                <small>${escapeHtml(item.detail || t("noExtraDetails"))}</small>
                ${progressMarkup}

            </article>

      function renderUploadProgressBar() {
        let percent = 0;
        let progressState = "idle";
        let metaText = t("uploadProgressIdle");

        if (statusState.type === "uploading") {
          progressState = "loading";
          percent = 12;
          metaText = t("queuedFiles", {
            count: statusState.files?.length || 0
          });
        } else if (statusState.type === "uploading-sequential") {
          const items = statusState.items || [];
          const totalItems = Math.max(1, items.length);
          const completedCount = items.filter((item) => item.state === "success" || item.state === "error").length;
          const hasError = items.some((item) => item.state === "error");
          const totalPercent = items.reduce((sum, item) => {
            const snapshot = getItemProgressSnapshot(item);
            if (snapshot) {
              return sum + snapshot.percent;
            }
            if (item.state === "success" || item.state === "error") {
              return sum + 100;
            }
            return sum;
          }, 0);
          percent = Math.round(totalPercent / totalItems);
          progressState =
            completedCount >= items.length && items.length
              ? hasError
                ? "error"
                : "success"
              : "loading";
          const activeItem =
            items.find((item) => item.state === "uploading" || item.state === "processing") ||
            items.find((item) => item.state === "queued");
          metaText =
            activeItem?.detail ||
            t("sequentialProgressSummary", {
              current: completedCount,
              total: items.length
            });
        } else if (statusState.type === "result") {
          const firstKind = String(statusState.result?.results?.[0]?.processedKind || "").toLowerCase();
          const isActionResult = ["check", "export", "exportandclear", "clearhistory", "edit", "delete"].includes(firstKind);
          if (!isActionResult) {
            percent = 100;
            progressState = statusState.isError || statusState.result?.ok === false ? "error" : "success";
            metaText = resolveMessage(statusState.result || {}, "uploadSuccessDefault", "uploadErrorDefault");
          }
        }

        uploadProgressCard.className = `upload-progress-card ${progressState}`;
        uploadProgressFill.style.width = `${Math.max(0, Math.min(100, percent))}%`;
        uploadProgressPercent.textContent = `${Math.max(0, Math.min(100, percent))}%`;
        uploadProgressMeta.textContent = metaText;
      }

      function createUploadRequestId() {
