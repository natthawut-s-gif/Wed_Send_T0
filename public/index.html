      function formatProcessingDetail(name, progress) {
        if (!progress || typeof progress !== "object") {
          return t("sequentialProcessingDetail", { name });
        }

        const pageCount = Number(progress.pageCount || progress.preparedPages || progress.outboundFileCount || 0);
        const currentPage = Number(progress.currentPageNumber || progress.preparedPages || progress.sentPages || 0);
        const sentPages = Number(progress.sentPages || 0);

        if (progress.phase === "forwarding_pdf_pages") {
          return t("sequentialPdfForwardDetail", {
            name,
            sentPages,
            pageCount: pageCount || 0
          });
        }

        if (progress.phase === "forwarding_image_ocr") {
          return t("sequentialImageForwardDetail", { name });
        }

        if (progress.phase === "forwarding_original") {
          return t("sequentialOriginalForwardDetail", { name });
        }

        if (OCR_STAGE_SEQUENCE.includes(progress.phase)) {
          const phaseKeyMap = {
            rendering_pdf: "sequentialPhaseRenderingPdf",
            preprocessing_image: "sequentialPhasePreparingImage",
            normalizing_size: "sequentialPhaseNormalizingSize",
            cropping_document: "sequentialPhaseCroppingDocument",
            deskewing_document: "sequentialPhaseDeskewingDocument",
            detecting_document_profile: "sequentialPhaseDetectingProfile",
            cleanup_document: "sequentialPhaseCleanupDocument",
            grayscale_document: "sequentialPhaseGrayscaleDocument",
            visual_cleanup: "sequentialPhaseVisualCleanup",
            denoise_document: "sequentialPhaseDenoiseDocument",
            enhance_document: "sequentialPhaseEnhanceDocument",
            scoring_ocr_candidates: "sequentialPhaseScoringCandidates"
          };
          return t("sequentialPhaseDetail", {
            name,
            phase: t(phaseKeyMap[progress.phase] || "sequentialProcessingDetail"),
            currentPage: currentPage || 1,
            pageCount: pageCount || 1,
            candidate: progress.candidate || "-"
          });
        }

        if (progress.phase === "rendering_pdf") {
          return t("sequentialPdfRenderDetail", {
            name,
            currentPage: currentPage || 0,
            pageCount: pageCount || 0
          });
        }

        if (progress.phase === "completed" || progress.phase === "completed_with_errors") {
          return t("sequentialCompletedDetail", {
            name,
            sentPages,
            pageCount: pageCount || Math.max(sentPages, 1)
          });
        }

        if (progress.phase === "failed") {
          return t("sequentialFailedDetail", {
            name,
            currentPage: currentPage || 0,
            pageCount: pageCount || 0,
            message: progress.error || t("uploadErrorDefault")
          });
        }

        return t("sequentialProcessingDetail", { name });
      }

      function uploadSingleFile(file, fields, onStateChange) {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          const formData = new FormData();
          const uploadRequestId = createUploadRequestId();
          let pollTimer = null;
          let settled = false;

          function stopPolling() {
            if (pollTimer) {
              clearInterval(pollTimer);
              pollTimer = null;
            }
          }

          async function pollProgress() {
            if (settled) {
              return;
            }

            try {
              const response = await fetch(`/upload-progress/${encodeURIComponent(uploadRequestId)}`);
              if (!response.ok) {
                return;
              }

              const result = await response.json();
              if (!result.ok || !result.progress) {
                return;
              }

              onStateChange({
                phase: "processing",
                progress: result.progress
              });

              if (
                result.progress.phase === "completed" ||
                result.progress.phase === "completed_with_errors" ||
                result.progress.phase === "failed"
              ) {
                settled = true;
                stopPolling();
                resolve({
                  ok: result.progress.result?.ok !== false,
                  status: result.progress.result?.ok === false ? 502 : 200,
                  result: result.progress.result || {
                    ok: result.progress.phase === "completed",
                    message: result.progress.error || t("uploadErrorDefault")
                  }
                });
              }
            } catch (error) {
              // Ignore transient polling errors while the upload request is still active.
            }
          }

          formData.append("files", file, file.name);
          formData.append("uploadRequestId", uploadRequestId);

          for (const [key, value] of Object.entries(fields)) {
            formData.append(key, value);
          }

          xhr.open("POST", "/upload");
          xhr.timeout = 0;

          xhr.upload.addEventListener("loadstart", () => {
            onStateChange({
              phase: "uploading",
              percent: 0
            });
          });

          xhr.upload.addEventListener("progress", (event) => {
            const percent = event.lengthComputable
              ? Math.max(1, Math.min(100, Math.round((event.loaded / event.total) * 100)))
              : null;

            onStateChange({
              phase: "uploading",
              percent
            });
          });

          xhr.upload.addEventListener("load", () => {
            onStateChange({
              phase: "processing",
              percent: 100,
              progress: {
                phase: "processing"
              }
            });
          });

          xhr.addEventListener("load", () => {
            let result = {};

            try {
              result = xhr.responseText ? JSON.parse(xhr.responseText) : {};
            } catch (error) {
              stopPolling();
              const rawResponse = (xhr.responseText || "").trim();
              const detail = rawResponse
                ? `${t("invalidServerResponse")} ${rawResponse.slice(0, 180)}`
                : t("invalidServerResponse");
              reject(new Error(detail));
              return;
            }

            if (result.accepted && result.uploadRequestId && xhr.status >= 200 && xhr.status < 300) {
              void pollProgress();
              pollTimer = setInterval(() => {
                void pollProgress();
              }, 450);
              return;
            }

            stopPolling();
            settled = true;
            resolve({
              ok: xhr.status >= 200 && xhr.status < 300,
              status: xhr.status,
              result
            });
          });

          xhr.addEventListener("error", () => {
            stopPolling();
            settled = true;
            reject(new Error(t("serverConnectionFailed")));
          });

          xhr.addEventListener("abort", () => {
            stopPolling();
            settled = true;
            reject(new Error(t("serverConnectionFailed")));
          });

          xhr.addEventListener("timeout", () => {
            stopPolling();
            settled = true;
            reject(new Error(t("requestTimedOut")));
          });

          xhr.send(formData);
        });
      }

      function renderStatus() {
        renderUploadProgressBar();

        if (statusState.type === "idle") {
          setPanelState("idle");
          statusBadge.textContent = t("ready");
          statusMessage.textContent = t("readyMessage");
          statusNumbers.textContent = t("readyResult");
          statusMeta.textContent = t("readyMeta");
          renderTimeline([
            `
              <article class="timeline-item neutral">
                <div class="timeline-dot"></div>
                <div class="timeline-body">
                  <strong>${escapeHtml(t("waiting"))}</strong>
                  <span>${escapeHtml(t("waitingSub"))}</span>
                </div>
              </article>
            `
          ]);
          return;
        }

        if (statusState.type === "uploading") {
          setPanelState("loading");
          statusBadge.textContent = t("processing");
          statusMessage.textContent = t("processingMessage");
          statusNumbers.textContent = t("queuedFiles", {
            count: statusState.files.length
          });
          statusMeta.textContent = t("startedAt", {
            timestamp: formatTimestamp()
          });
          renderTimeline(
            statusState.files.map(
              (file, index) => `
                <article class="timeline-item loading">
                  <div class="timeline-dot"></div>
                  <div class="timeline-body">
                    <strong>${escapeHtml(t("queuedLabel", { index: index + 1 }))}</strong>
                    <span>${escapeHtml(t("queuedMessage", { name: file.name }))}</span>
                  </div>
                </article>
              `
            )
          );
          return;
        }

        if (statusState.type === "uploading-sequential") {
          const items = statusState.items || [];
          const completedCount = items.filter((item) => item.state === "success" || item.state === "error")
            .length;

          setPanelState("loading");
          statusBadge.textContent = t("processing");
          statusMessage.textContent = t("processingSequentialMessage");
          statusNumbers.textContent = t("sequentialProgressSummary", {
            current: completedCount,
            total: items.length
          });
          statusMeta.textContent = t("startedAt", {
            timestamp: statusState.startedAt || formatTimestamp()
          });
          renderTimeline(renderUploadTimelineItems(items));
          return;
        }

        if (statusState.type === "action-loading") {
          setPanelState("loading");
          statusBadge.textContent =
            statusState.action === "check"
              ? t("checkingActionStatus")
              : statusState.action === "clearhistory"
                ? t("sendingCommand")
              : statusState.action === "edit"
                ? t("sendingCommand")
                : t("exportingActionStatus");
          statusMessage.textContent =
            statusState.action === "check"
              ? t("checkingActionMessage")
              : statusState.action === "clearhistory"
                ? `${t("clearHistoryButton")}...`
              : statusState.action === "exportandclear"
                ? t("exportAndClearLoading")
                : t("exportingActionMessage");
          statusNumbers.textContent = statusState.email
            ? `${t("emailMetaLabel")} ${statusState.email}`
            : t("preparingRequest");
          statusMeta.textContent = t("startedAt", {
            timestamp: formatTimestamp()
          });
          renderTimeline([
            `
              <article class="timeline-item loading">
                <div class="timeline-dot"></div>
                <div class="timeline-body">
                  <strong>${escapeHtml(
                    statusState.action === "check"
                      ? t("checkRequest")
                      : statusState.action === "clearhistory"
                        ? t("clearHistoryButton")
                      : statusState.action === "exportandclear"
                        ? t("exportAndClearRequest")
                        : t("exportRequest")
                  )}</strong>
                  <span>${escapeHtml(
                    t("requestSendingMessage", {
                      email: statusState.email || "-"
                    })
                  )}</span>
                </div>
              </article>
            `
          ]);
          return;
        }

        if (statusState.type === "result") {
          const result = statusState.result;
          const state = statusState.isError || result.ok === false ? "error" : "success";
          const successCount = result.successCount ?? 0;
          const failureCount = result.failureCount ?? 0;
          const outboundFileCount = result.outboundFileCount ?? result.fileCount ?? 0;

          setPanelState(state);
          statusBadge.textContent = state === "success" ? t("completed") : t("needsReview");
          statusMessage.textContent = resolveMessage(
            result,
            "uploadSuccessDefault",
            "uploadErrorDefault"
          );
          statusNumbers.textContent =
            state === "success"
              ? t("deliveriesCompleted", {
                  successCount,
                  outboundFileCount
                })
              : t("resultsMixed", {
                  successCount,
                  failureCount
                });
          statusMeta.textContent = [
            result.batchId ? t("batchLabel", { batchId: result.batchId }) : null,
            t("updatedAt", { timestamp: formatTimestamp() })
          ]
            .filter(Boolean)
            .join(" | ");

          const timelineResults =
            Array.isArray(result.fileResults) && result.fileResults.length
              ? result.fileResults
              : Array.isArray(result.results) && result.results.length
                ? result.results
                : [];

          if (timelineResults.length) {
            renderTimeline(
              timelineResults.map((item) => {
                const itemState = item.ok ? "success" : "error";
                const detail = item.detailMessage
                  ? item.detailMessage
                  : [
                      item.sourceOriginalName
                        ? `${t("sourceLabel")}: ${item.sourceOriginalName}`
                        : null,
                      item.sourcePageNumber ? `${t("pageLabel")} ${item.sourcePageNumber}` : null,
                      item.processedKind ? `${t("kindLabel")}: ${item.processedKind}` : null,
                      item.webhookStatus
                        ? `${t("webhookMetaLabel")}: ${item.webhookStatus}`
                        : null,
                      item.errorKey ? t(item.errorKey) : item.error || null
                    ]
                      .filter(Boolean)
                      .join(" | ");

                return `
                  <article class="timeline-item ${itemState}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-body">
                      <strong>${escapeHtml(
                        item.ok ? t("delivered") : t("failed")
                      )} ${escapeHtml(String(item.fileIndex || ""))}</strong>
                      <span>${escapeHtml(item.originalName || t("unnamedFile"))}</span>
                      <small>${escapeHtml(detail || t("noExtraDetails"))}</small>
                    </div>
                  </article>
                `;
              })
            );
            return;
          }

          renderTimeline([
            `
              <article class="timeline-item ${state}">
                <div class="timeline-dot"></div>
                <div class="timeline-body">
                  <strong>${escapeHtml(
                    state === "success" ? t("completed") : t("issueDetected")
                  )}</strong>
                  <span>${escapeHtml(resolveMessage(result, "uploadSuccessDefault", "noAdditionalDetails"))}</span>
                </div>
              </article>
            `
          ]);
        }
      }

      async function triggerDocAction(action, options = {}) {
        const {
          useExportModal = false,
          clearHistoryAfterSuccess = false,
          editedData = null,
          rowData = null,
          rowDeleteIndex = null
        } = options;
        const email = senderEmail.value.trim();
        const previousExportPreviewState = useExportModal ? exportPreviewState : null;
        const previousEditedBody = useExportModal ? deepCloneValue(previousExportPreviewState?.editedBody) : null;

        if (!email) {
          statusState = {
            type: "result",
            isError: true,
            result: {
              ok: false,
              messageKey: "emailRequiredMessage",
              results: [
                {
                  ok: false,
                  originalName: action === "check" ? "Check action" : "Export action",
                  errorKey: "emailRequiredError"
                }
              ]
            }
          };
          renderStatus();
          return;
        }

        checkButton.disabled = true;
        exportButton.disabled = true;
        submitButton.disabled = true;
        exportAndClearConfirmButton.disabled = true;
        clearHistoryButton.disabled = true;
        statusState = {
          type: "action-loading",
          action,
          email
        };
        if (action === "check") {
          actionCardStates.check = {
            type: "loading",
            action,
            email
          };
        }
        if (useExportModal) {
          exportPreviewState = {
            type: "loading",
            action,
            email
          };
          openExportPreviewModal();
        }
        renderStatus();
        if (action === "check") {
          renderActionCard("check");
        }
        if (useExportModal) {
          renderExportPreviewModal();
        }

        try {
          const response = await fetch("/doc-action", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              action,
              email,
              editedData,
              rowData
            })
          });

          const result = await response.json();

          const actionSucceeded = response.ok && result.ok;
          let historyCleared = false;
          const normalizedResult = {
            ...result,
            message:
              action === "edit" && actionSucceeded
                ? t("exportModalEditSuccess")
                : action === "delete" && actionSucceeded
                  ? t("exportModalDeleteSuccess")
                : result.message
          };

          if (clearHistoryAfterSuccess && actionSucceeded) {
            historyCleared = await clearUploadHistory({ silent: true });
          }

          if (action === "check") {
            actionCardStates.check = {
              type: "result",
              ok: actionSucceeded,
              email,
              result: {
                ...normalizedResult,
                historyCleared
              }
            };
            renderActionCard("check");
          }

          if (useExportModal) {
            let localWebhookBody = deepCloneValue(result.webhookBody);
            let keepEditing = false;
            let messageOverride = null;

            if (
              action === "delete" &&
              actionSucceeded &&
              Array.isArray(previousEditedBody) &&
              Number.isInteger(rowDeleteIndex)
            ) {
              localWebhookBody = previousEditedBody.filter((_, index) => index !== rowDeleteIndex);
              keepEditing = true;
              messageOverride = t("exportModalDeleteSuccess");
            } else if (action === "edit" && actionSucceeded) {
              messageOverride = t("exportModalEditSuccess");
            }

            const originalBody = deepCloneValue(localWebhookBody);
            exportPreviewState = {
              type: "result",
              ok: actionSucceeded,
              action,
              email,
              isEditing: keepEditing,
              sortDirection: previousExportPreviewState?.sortDirection || "asc",
              messageOverride,
              originalBody,
              editedBody: deepCloneValue(originalBody),
              result: {
                ...normalizedResult,
                webhookBody: localWebhookBody,
                historyCleared
              }
            };
            sortExportPreviewRowsInState(exportPreviewState.sortDirection || "asc");
            renderExportPreviewModal();
          }

          statusState = {
            type: "result",
            isError: !actionSucceeded,
            result: {
              ...normalizedResult,
              historyCleared,
              successCount: actionSucceeded ? 1 : 0,
              failureCount: actionSucceeded ? 0 : 1,
              outboundFileCount: 1,
              results: [
                {
                  ok: actionSucceeded,
                  fileIndex: 1,
                  originalName:
                    action === "check"
                      ? "Check action"
                      : action === "clearhistory"
                        ? "Clear History action"
                      : action === "delete"
                        ? "Delete row action"
                      : action === "exportandclear"
                        ? "Export and Clear action"
                        : "Export action",
                  sourceOriginalName: email,
                  processedKind: action,
                  webhookStatus: result.webhookStatus,
                  error: result.error || (!result.ok ? result.message : "")
                }
              ]
            }
          };
          renderStatus();
        } catch (error) {
          if (action === "check") {
            actionCardStates.check = {
              type: "error",
              action,
              email,
              message: error.message
            };
            renderActionCard("check");
          }

          if (useExportModal) {
            exportPreviewState = {
              type: "error",
              action,
              email,
              message: error.message
            };
            renderExportPreviewModal();
          }

          statusState = {
            type: "result",
            isError: true,
            result: {
              ok: false,
              messageKey: "serverConnectionFailed",
              results: [
                {
                  ok: false,
                  originalName:
                    action === "check"
                      ? "Check action"
                      : action === "clearhistory"
                        ? "Clear History action"
                      : action === "delete"
                        ? "Delete row action"
                      : action === "exportandclear"
                        ? "Export and Clear action"
                        : "Export action",
                  error: error.message
                }
              ]
            }
          };
          renderStatus();
        } finally {
          checkButton.disabled = false;
          exportButton.disabled = false;
          submitButton.disabled = false;
          exportAndClearConfirmButton.disabled = false;
          clearHistoryButton.disabled = false;
        }
      }

      async function runChatCommand() {
        const command = chatInput.value.trim();
        const node = chatNodeSelect.value.trim();

        if (!node) {
          setChatMessageState({ state: "error", key: "chatNodeRequired" });
          chatResponseState = {
            type: "error",
            node,
            command,
            message: t("chatNodeRequired")
          };
          renderChatResponse();
          return;
        }

        if (!command) {
          setChatMessageState({ state: "error", key: "chatCommandRequired" });
          chatResponseState = {
            type: "error",
            node,
            command,
            message: t("chatCommandRequired")
          };
          renderChatResponse();
          return;
        }

        runChatCommandButton.disabled = true;
        chatNodeSelect.disabled = true;
        chatInput.disabled = true;
        chatResponseState = {
          type: "loading",
          node,
          command
        };
        setChatMessageState({ state: "loading", key: "chatSending" });
        renderChatResponse();

        try {
          const response = await fetch("/web-command", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              message: command,
              node
            })
          });

          const result = await response.json();
          const isSuccess = response.ok && result.ok;

          chatResponseState = {
            type: "result",
            ok: isSuccess,
            result
          };
          setChatMessageState({
            state: isSuccess ? "success" : "error",
            key: isSuccess ? "chatSuccess" : "chatFailed",
            raw: isSuccess ? null : result.message || null
          });
          renderChatResponse();
        } catch (error) {
          chatResponseState = {
            type: "error",
            node,
            command,
            message: error.message
          };
          setChatMessageState({ state: "error", raw: error.message });
          renderChatResponse();
        } finally {
          runChatCommandButton.disabled = false;
          chatNodeSelect.disabled = chatNodesLoading;
          chatInput.disabled = false;
        }
      }

      exportModalResponseBody.addEventListener("input", (event) => {
        const input = event.target.closest(".table-edit-input");
        if (!input || !exportPreviewState?.isEditing) {
          return;
        }

        const rowIndex = Number(input.dataset.rowIndex);
        const field = input.dataset.field || "";
        updateEditableExportValue(Number.isNaN(rowIndex) ? null : rowIndex, field, input.value);
      });

      exportModalResponseBody.addEventListener("click", (event) => {
        const sortButton = event.target.closest("[data-sort-field='id']");
        if (sortButton && exportPreviewState?.type === "result") {
          const nextDirection = exportPreviewState.sortDirection === "asc" ? "desc" : "asc";
          sortExportPreviewRowsInState(nextDirection);
          renderExportPreviewModal();
          return;
        }

        const deleteButton = event.target.closest("[data-delete-row-index]");
        if (!deleteButton || !exportPreviewState?.isEditing) {
          return;
        }

        if (!window.confirm(t("exportModalDeleteRowConfirm"))) {
          return;
        }

        const rowIndex = Number(deleteButton.dataset.deleteRowIndex);
        if (Number.isNaN(rowIndex) || !Array.isArray(exportPreviewState.editedBody)) {
          return;
        }

        const rowData = deepCloneValue(exportPreviewState.editedBody[rowIndex]);
        if (!rowData || typeof rowData !== "object") {
          return;
        }

        triggerDocAction("delete", {
          useExportModal: true,
          rowData,
          rowDeleteIndex: rowIndex
        });
      });

      settingsModal.addEventListener("click", (event) => {
        if (event.target === settingsModal) {
          closeSettingsModal();
        }
      });

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await runChatCommand();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !chatModal.classList.contains("hidden")) {
          closeChatModal();
        }

        if (event.key === "Escape" && !settingsModal.classList.contains("hidden")) {
          closeSettingsModal();
        }

        if (event.key === "Escape" && !exportPreviewModal.classList.contains("hidden")) {
          closeExportPreviewModal();
        }
      });

      window.addEventListener("load", () => {
        if (currentSettingsPayload) {
          renderGoogleLoginButton();
        }
      });

      lightThemeButton.addEventListener("click", () => {
        applyTheme("light");
      });

      darkThemeButton.addEventListener("click", () => {
        applyTheme("dark");
      });

      thaiLanguageButton.addEventListener("click", () => {
        applyLanguage("th");
      });

      englishLanguageButton.addEventListener("click", () => {
        applyLanguage("en");
      });

      senderNameInput.addEventListener("input", persistSenderFields);
      senderEmail.addEventListener("input", () => {
        loginEmailInput.value = senderEmail.value;
        persistSenderFields();
        renderUploadHistory();
      });

      settingsForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        saveSettingsButton.disabled = true;
        setSettingsMessageState({ state: "loading", key: "savingSettings" });

        try {
          const response = await fetch("/settings/webhooks", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              webhookUrl: settingsWebhookUrl.value.trim(),
              actionWebhookUrl: settingsActionWebhookUrl.value.trim(),
              commandWebhookUrl: settingsCommandWebhookUrl.value.trim(),
              loginWebhookUrl: settingsLoginWebhookUrl.value.trim(),
              googleClientId: settingsGoogleClientId.value.trim(),
              microsoftClientId: settingsMicrosoftClientId.value.trim(),
              microsoftAuthority: settingsMicrosoftAuthority.value.trim()
            })
          });

          const result = await response.json();

          if (!response.ok || !result.ok) {
            throw new Error(result.message || t("failedSaveSettings"));
          }

          currentSettingsPayload = result;
          renderSettingsStatus();
          renderGoogleLoginButton();
          setSettingsMessageState({ state: "success", key: "settingsSaved" });
        } catch (error) {
          setSettingsMessageState({ state: "error", raw: error.message });
        } finally {
          saveSettingsButton.disabled = false;
        }
      });

      fileInput.addEventListener("change", () => {
        mergeSelectedFiles(Array.from(fileInput.files));
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("dragging");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.remove("dragging");
        });
      });

      dropzone.addEventListener("drop", (event) => {
        mergeSelectedFiles(Array.from(event.dataTransfer.files));
      });

      fileList.addEventListener("click", (event) => {
        const removeButton = event.target.closest(".file-remove-button");
        if (!removeButton) {
          return;
        }

        const fileIndex = Number(removeButton.dataset.fileIndex);
        if (Number.isNaN(fileIndex)) {
          return;
        }

        selectedFiles = selectedFiles.filter((_, index) => index !== fileIndex);
        syncFileInput();
        renderFiles(selectedFiles);
      });

      checkButton.addEventListener("click", () => {
        triggerDocAction("check");
      });

      exportButton.addEventListener("click", () => {
        triggerDocAction("export", { useExportModal: true });
      });

      closeExportModalButton.addEventListener("click", () => {
        closeExportPreviewModal();
      });

      manualLoginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await runManualLogin();
      });

      manualRegisterButton.addEventListener("click", async () => {
        await runManualRegister();
      });

      microsoftLoginButton.addEventListener("click", async () => {
        await runMicrosoftLogin();
      });

      editExportButton.addEventListener("click", () => {
        if (!exportPreviewState || exportPreviewState.type !== "result") {
          return;
        }

        if (!exportPreviewState.isEditing) {
          exportPreviewState = {
            ...exportPreviewState,
            isEditing: true,
            originalBody: deepCloneValue(exportPreviewState.result.webhookBody),
            editedBody: deepCloneValue(exportPreviewState.result.webhookBody)
          };
          renderExportPreviewModal();
          return;
        }

        triggerDocAction("edit", {
          useExportModal: true,
          editedData: deepCloneValue(exportPreviewState.editedBody)
        });
      });

      cancelEditExportButton.addEventListener("click", () => {
        if (!exportPreviewState || exportPreviewState.type !== "result") {
          return;
        }

        exportPreviewState = {
          ...exportPreviewState,
          isEditing: false,
          editedBody: deepCloneValue(exportPreviewState.result.webhookBody)
        };
        renderExportPreviewModal();
      });

      exportAndClearConfirmButton.addEventListener("click", () => {
        triggerDocAction("exportandclear", {
          useExportModal: true,
          clearHistoryAfterSuccess: true
        });
      });

      clearHistoryButton.addEventListener("click", () => {
        triggerDocAction("clearhistory", {
          clearHistoryAfterSuccess: true
        });
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!selectedFiles.length) {
          statusState = {
            type: "result",
            isError: true,
            result: {
              ok: false,
              messageKey: "noFilesSelectedError"
            }
          };
          renderStatus();
          return;
        }

        submitButton.disabled = true;
        checkButton.disabled = true;
        exportButton.disabled = true;
        const sequentialItems = createSequentialUploadItems(selectedFiles);
        statusState = {
          type: "uploading-sequential",
          items: sequentialItems,
          startedAt: formatTimestamp()
        };
        renderStatus();

        try {
          const uploadFields = buildSharedUploadFields();
          const fileResults = [];
          const allWebhookResults = [];
          let aggregateSuccessCount = 0;
          let aggregateFailureCount = 0;
          let aggregateOutboundFileCount = 0;
          let hasError = false;

          for (const [index, file] of selectedFiles.entries()) {
            sequentialItems[index] = {
              ...sequentialItems[index],
              state: "uploading",
              detail: t("sequentialUploadingDetail", {
                name: file.name,
                percent: "0%"
              })
            };
            statusState = {
              type: "uploading-sequential",
              items: [...sequentialItems],
              startedAt: statusState.startedAt
            };
            renderStatus();

            try {
              const uploadResponse = await uploadSingleFile(file, uploadFields, (progressState) => {
                if (progressState.phase === "uploading") {
                  sequentialItems[index] = {
                    ...sequentialItems[index],
                    state: "uploading",
                    uploadPercent:
                      progressState.percent === null ? sequentialItems[index].uploadPercent : progressState.percent,
                    detail: t("sequentialUploadingDetail", {
                      name: file.name,
                      percent:
                        progressState.percent === null
                          ? "..."
                          : `${progressState.percent}%`
                    })
                  };
                } else if (progressState.phase === "processing") {
                  sequentialItems[index] = {
                    ...sequentialItems[index],
                    state: "processing",
                    uploadPercent: 100,
                    detail: formatProcessingDetail(file.name, progressState.progress),
                    progress: progressState.progress || null
                  };
                }

                statusState = {
                  type: "uploading-sequential",
                  items: [...sequentialItems],
                  startedAt: statusState.startedAt
                };
                renderStatus();
              });

              const serverResult = uploadResponse.result || {};
              const outboundFileCount = serverResult.outboundFileCount ?? 0;
              const successCount = serverResult.successCount ?? 0;
              const failureCount = serverResult.failureCount ?? 0;
              const fileOk = uploadResponse.ok && serverResult.ok !== false;
              const detailMessage = fileOk
                ? t("sequentialFileSuccessDetail", {
                    successCount,
                    outboundFileCount
                  })
                : t("sequentialFileErrorDetail", {
                    message:
                      serverResult.message ||
                      serverResult.error ||
                      t("uploadErrorDefault")
                  });

              aggregateSuccessCount += successCount;
              aggregateFailureCount += failureCount;
              aggregateOutboundFileCount += outboundFileCount;
              if (Array.isArray(serverResult.results)) {
                allWebhookResults.push(...serverResult.results);
              }
              if (!fileOk) {
                hasError = true;
              }

              fileResults.push({
                ok: fileOk,
                fileIndex: index + 1,
                originalName: file.name,
                detailMessage,
                successCount,
                failureCount,
                outboundFileCount,
                webhookStatus: fileOk ? "OK" : serverResult.webhookStatus || "ERROR",
                error: fileOk ? "" : serverResult.error || serverResult.message || ""
              });

              sequentialItems[index] = {
                ...sequentialItems[index],
                ok: fileOk,
                state: fileOk ? "success" : "error",
                detail: detailMessage,
                progress: {
                  phase: fileOk ? "completed" : "completed_with_errors",
                  pageCount: serverResult.outboundFileCount ?? 0,
                  sentPages: successCount + failureCount
                },
                successCount,
                failureCount,
                outboundFileCount
              };
            } catch (error) {
              hasError = true;
              aggregateFailureCount += 1;

              const detailMessage = t("sequentialFileErrorDetail", {
                message: error.message
              });

              fileResults.push({
                ok: false,
                fileIndex: index + 1,
                originalName: file.name,
                detailMessage,
                successCount: 0,
                failureCount: 1,
                outboundFileCount: 0,
                webhookStatus: "NETWORK_ERROR",
                error: error.message
              });

              sequentialItems[index] = {
                ...sequentialItems[index],
                ok: false,
                state: "error",
                detail: detailMessage,
                progress: sequentialItems[index].progress || null,
                successCount: 0,
                failureCount: 1,
                outboundFileCount: 0
              };
            }

            statusState = {
              type: "uploading-sequential",
              items: [...sequentialItems],
              startedAt: statusState.startedAt
            };
            renderStatus();
          }

          statusState = {
            type: "result",
            isError: hasError,
            result: {
              ok: !hasError,
              message: hasError
                ? t("sequentialPartialFailureMessage")
                : t("sequentialAllSuccessMessage"),
              fileCount: selectedFiles.length,
              outboundFileCount: aggregateOutboundFileCount,
              successCount: aggregateSuccessCount,
              failureCount: aggregateFailureCount,
              fileResults,
              results: allWebhookResults
            }
          };
          renderStatus();

          if (aggregateSuccessCount > 0) {
            await loadUploadHistory();
          }

          if (hasError) {
            return;
          }

          noteInput.value = "";
          selectedFiles = [];
          syncFileInput();
          renderFiles(selectedFiles);
        } catch (error) {
          statusState = {
            type: "result",
            isError: true,
            result: {
              ok: false,
              messageKey: "serverConnectionFailed",
              results: [
                {
                  ok: false,
                  originalName: t("networkRequestLabel"),
                  error: error.message
                }
              ]
            }
          };
          renderStatus();
        } finally {
          submitButton.disabled = false;
          checkButton.disabled = false;
          exportButton.disabled = false;
        }
      });

      initializeTheme();
      initializeLanguage();
      initializeSenderFields();
      loadLoginSession();
      renderLoginMessage();
      loadSettings();
      loadUploadHistory();
    </script>
  </body>
</html>
